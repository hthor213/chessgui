# PC client builds (spec 222): Windows + Linux bundles of apps/desktop via
# the official tauri-action. Deliberately unsigned — family-scale
# distribution; the install doc (docs/pc-install.md) covers the two
# SmartScreen clicks. A tag push (v*) attaches the bundles to a GitHub
# release; a manual run (workflow_dispatch) uploads workflow artifacts only.
#
# The Stockfish sidecar is fetched sha256-pinned at build time by
# scripts/fetch-stockfish-sidecar.sh — binaries are never vendored in git.
name: PC client build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # release asset upload on tag builds

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            sidecar-target: windows-x64
          - os: ubuntu-22.04 # pins the webkit2gtk baseline: binaries run on 22.04+ (spec 222)
            sidecar-target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webkit/gtk build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch pinned Stockfish sidecar
        shell: bash
        run: scripts/fetch-stockfish-sidecar.sh ${{ matrix.sidecar-target }}

      # On a tag push the tagName/releaseName inputs are set and tauri-action
      # attaches the bundles to a GitHub release; on workflow_dispatch the
      # expressions collapse to '' and tauri-action just builds.
      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('ChessGUI {0}', github.ref_name) || '' }}
          releaseBody: >-
            Unsigned family build (spec 222). Windows will show SmartScreen:
            "More info" then "Run anyway". Install notes: docs/pc-install.md.
          releaseDraft: false
          prerelease: false

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chessgui-${{ matrix.sidecar-target }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
