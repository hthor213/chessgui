# ChessGUI web client (spec 221) — static export behind Caddy.
# Caddy strips the /chess prefix, so everything here serves from /.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation for SharedArrayBuffer (multi-threaded stockfish
    # WASM — spec 221 "WASM deployment detail"). Versioned here instead of the
    # Caddyfile on purpose. `always` = also emitted on 404/error responses.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    gzip on;
    gzip_types text/css application/javascript application/json application/wasm image/svg+xml;

    error_page 404 /404.html;

    # Next static export emits routes as both arena.html and arena/ — try the
    # bare .html before treating the URI as a directory.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Content-hashed assets: cache forever. NOTE: add_header in a location
    # REPLACES the inherited server-level set, so COOP/COEP must repeat here.
    location /_next/static/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
